name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:

  # =========================
  # BOOK API TESTS
  # =========================
  test-book-api:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: books_test
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: book-api
        run: pip install -r requirements.txt

      - name: Run unit + integration tests
        working-directory: book-api
        env:
          DATABASE_URL: mysql+pymysql://${{ secrets.MYSQL_USER }}:${{ secrets.MYSQL_PASSWORD }}@127.0.0.1:3306/${{ secrets.MYSQL_DB }}
        run: pytest tests/unit tests/integration -v


  # =========================
  # ORDER API TESTS
  # =========================
  test-order-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run Go tests
        working-directory: order-api
        run: go test ./... -v


  # =========================
  # E2E TESTS (FULL STACK)
  # =========================
  test-e2e:
    needs:
      - test-book-api
      - test-order-api

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 1. Create env file safely
      # =========================
      - name: Create .env.docker
        run: |
          cat <<EOF > .env.docker
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DB=${{ secrets.MYSQL_DB }}

          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}

          MYSQL_PORT=3306
          POSTGRES_PORT=5432

          BOOK_SERVICE_URL=http://book-api:8000
          BOOK_API_URL=http://localhost:8000
          ORDER_API_URL=http://localhost:8080
          EOF

      - name: Verify env variables exist
        run: |
          test -n "$MYSQL_ROOT_PASSWORD"
          test -n "$MYSQL_USER"
          test -n "$POSTGRES_USER"
          echo "All required secrets are present."
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}      

      # =========================
      # 2. Start full stack
      # =========================

      - name: Clean previous containers
        run: |
          docker compose down -v --remove-orphans || true

      - name: Verify .env.docker
        run: |
          ls -la
          test -f .env.docker
          echo ".env.docker exists"

      - name: Start application stack
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}

          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

          MYSQL_PORT: 3306
          POSTGRES_PORT: 5432

          BOOK_SERVICE_URL: http://book-api:8000
          BOOK_API_URL: http://localhost:8000
          ORDER_API_URL: http://localhost:8080

        run: |
          docker compose up -d --build

      - name: Debug startup
        if: failure()
        run: |
          docker ps -a
          docker logs mysql-db
          docker logs postgres-db

      # =========================
      # 3. Wait for databases
      # =========================
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            docker exec mysql-db mysqladmin ping -uroot -proot && break
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            docker exec postgres-db pg_isready -U postgres && break
            echo "Waiting for Postgres..."
            sleep 2
          done

      # =========================
      # 4. Wait for APIs
      # =========================
      - name: Wait for Book API
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/docs && break
            echo "Waiting for Book API..."
            sleep 2
          done

      - name: Wait for Order API
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8080/docs && break
            echo "Waiting for Order API..."
            sleep 2
          done

      # =========================
      # 5. Run E2E tests
      # =========================
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install E2E dependencies
        working-directory: book-api
        run: pip install -r requirements.txt

      - name: Run E2E tests
        env:
          DATABASE_URL: mysql+pymysql://${{ secrets.MYSQL_USER }}:${{ secrets.MYSQL_PASSWORD }}@127.0.0.1:3306/${{ secrets.MYSQL_DB }}
          BASE_URL_BOOK: http://localhost:8000
          BASE_URL_ORDER: http://localhost:8080

        run: |
          echo "DATABASE_URL=$DATABASE_URL"
          pytest book-api/tests/e2e -v

      # =========================
      # 6. Debug logs on failure
      # =========================
      - name: Collect logs (on failure)
        if: failure()
        run: docker compose logs

      # =========================
      # 7. Cleanup
      # =========================
      - name: Shutdown stack
        if: always()
        run: docker compose down -v


  # =========================
  # BUILD & PUSH IMAGES
  # =========================
  build-images:
    needs:
      - test-e2e

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # previously DOCKERHUB_USERNAME was used
          password: ${{ secrets.DOCKER_PASSWORD }} # previously DOCKERHUB_TOKEN was used

      - name: Build images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/book-api:latest ./book-api
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-api:latest ./order-api
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/book-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/order-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest